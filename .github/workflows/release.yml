# Release: publish each native shell as a self-contained, startup-optimized build.
#
# Startup optimization = ReadyToRun (PublishReadyToRun): IL is precompiled to native so there's
# little JIT work at launch. Native AOT is NOT usable here — WinForms (and WPF, which Weavie.Win
# enables for the WebView2 control) and WebView2 rely on reflection/COM that AOT doesn't support —
# so R2R + self-contained is the right lever. Output is a plain folder (no single-file compression,
# which would decompress at launch and hurt cold start).
#
# Each shell publishes on its own OS (Weavie.Win needs Windows; Weavie.Mac needs the macOS workload)
# and the result is uploaded as a build artifact. The remote control plane (Weavie.Runner) ships too:
# publishing it stages the Weavie.Headless worker beside it, so that one artifact is the complete
# runner + headless deploy. Triggered manually or by pushing a v* tag.
#
# Green main additionally republishes the runner bundle as the rolling `main-latest` prerelease
# (the main-latest job) — the update feed `weavie-runner --auto-update` polls. See
# docs/specs/runner-auto-update.md.
name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    name: publish (${{ matrix.name }})
    # workflow_run (green main) feeds only the main-latest job below.
    if: github.event_name != 'workflow_run'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            project: src/Weavie.Linux/Weavie.Linux.csproj
            rid: linux-x64
            # R2R + self-contained: native-precompiled, no machine .NET dependency.
            extra: --self-contained -p:PublishReadyToRun=true
          - name: runner-linux-x64
            os: ubuntu-latest
            project: src/Weavie.Runner/Weavie.Runner.csproj
            rid: linux-x64
            # The remote control plane. Its publish stages the Weavie.Headless worker into worker/,
            # propagating RID + self-contained, so this single artifact is the full runner + headless
            # deploy. Same R2R + self-contained lever as the linux shell.
            extra: --self-contained -p:PublishReadyToRun=true
          - name: win-x64
            os: windows-latest
            project: src/Weavie.Win/Weavie.Win.csproj
            rid: win-x64
            extra: --self-contained -p:PublishReadyToRun=true
          - name: osx-arm64
            # macOS 26 (Tahoe) image — ships Xcode 26, which net10.0-macos requires. See ci.yml.
            os: macos-26
            project: src/Weavie.Mac/Weavie.Mac.csproj
            rid: osx-arm64
            # net10.0-macos publishes a self-contained .app via the macos workload. Trimming is
            # disabled in the csproj (PublishTrimmed=false): Weavie.Core's reflection-based
            # System.Text.Json isn't trim-safe, so full trimming fails publish (and risks runtime
            # breakage). R2R isn't the lever here, so it's left to the workload's Release defaults.
            extra: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up toolchain and build web app
        uses: ./.github/actions/publish-setup

      - name: Restore macOS workload
        if: matrix.name == 'osx-arm64'
        run: dotnet workload restore ${{ matrix.project }}

      - name: Publish
        run: >
          dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }}
          ${{ matrix.extra }} -o artifacts/${{ matrix.name }}

      # Package the macOS app. `dotnet publish` for the macOS SDK emits a .pkg installer
      # (artifacts/<name>/Weavie.Mac-*.pkg) whose payload is staged from the publish item pipeline and
      # does NOT include the build's hand-copied web UI / PTY shim / hook relay — that .pkg boots to a
      # blank white WKWebView (app://app/index.html 404s). The COMPLETE bundle is the one the build
      # assembles at the project's bin/ output (CopyWebAssets + BuildPtyShim + the hook-relay
      # co-location all populate it). So verify THAT .app, then ship it zipped (a drag-to-Applications
      # bundle — friendlier for an unsigned app than an unsigned .pkg) instead of the .pkg.
      - name: Verify and package macOS app
        if: matrix.name == 'osx-arm64'
        shell: bash
        run: |
          app="src/Weavie.Mac/bin/Release/net10.0-macos/${{ matrix.rid }}/Weavie.Mac.app"
          required=(
            "$app/Contents/MacOS/Weavie.Mac"
            "$app/Contents/Resources/wwwroot/index.html"
            "$app/Contents/MonoBundle/libweavie_pty.dylib"
            "$app/Contents/MonoBundle/weavie-hook-relay"
          )
          missing=0
          for f in "${required[@]}"; do
            if [ -e "$f" ]; then
              echo "ok: $f"
            else
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Built Weavie.Mac.app is incomplete — see MISSING entries above."
            echo "Bundle contents:"; find "$app" -maxdepth 3 -print
            exit 1
          fi
          # Re-sign the fully-assembled bundle. The macOS SDK ad-hoc signs the .app mid-build, but the
          # post-build copies (web UI, PTY shim, hook relay) change the sealed contents and invalidate
          # that signature — and on Apple Silicon an invalid signature reads as "damaged and can't be
          # opened". Re-sign (ad-hoc, inside-out via --deep) so the seal matches the final contents.
          # It's still not Developer-ID-signed/notarized, so a downloaded copy is quarantined: first
          # launch is right-click > Open (or `xattr -dr com.apple.quarantine Weavie.Mac.app`).
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          # Replace the .pkg-containing publish dir with just the zipped .app.
          rm -rf "artifacts/${{ matrix.name }}"
          mkdir -p "artifacts/${{ matrix.name }}"
          ditto -c -k --sequesterRsrc --keepParent "$app" "artifacts/${{ matrix.name }}/Weavie.Mac.app.zip"
          echo "Packaged $(du -h "artifacts/${{ matrix.name }}/Weavie.Mac.app.zip" | cut -f1) zip."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weavie-${{ matrix.name }}
          path: artifacts/${{ matrix.name }}
          if-no-files-found: error

  # Rolling prerelease consumed by `weavie-runner --auto-update`: every green-main CI run
  # republishes the complete runner+worker bundle as the `main-latest` prerelease, packaged as the
  # managed layout (versions/<build>/ + current symlink) so extracting the tarball IS an install.
  # manifest.json (buildNumber + spawnContract) is written by the publish itself. See
  # docs/specs/runner-auto-update.md.
  main-latest:
    name: main-latest prerelease
    # Only a PUSH-triggered ci success qualifies: workflow_run also fires for fork-PR ci runs, and a
    # fork branch named "main" must never reach a contents:write job (it could rewrite the release
    # feed the auto-updater trusts). Push events can only originate from this repo.
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Rapid main merges must not interleave the delete/recreate of the rolling release.
    concurrency:
      group: main-latest
      cancel-in-progress: true
    steps:
      # Checkout of the base repo's main tip — never an event-supplied sha, so no untrusted code can
      # reach this privileged build. The tip can be newer than the green commit that triggered us;
      # that run's own ci success re-triggers this workflow, and the newest publish wins either way.
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up toolchain and build web app
        uses: ./.github/actions/publish-setup

      - name: Publish runner bundle into the managed layout
        run: >
          dotnet publish src/Weavie.Runner/Weavie.Runner.csproj -c Release -r linux-x64
          --self-contained -p:PublishReadyToRun=true
          -o layout/versions/${{ github.run_number }}

      # A tarball (not upload-artifact's zip) so executable bits and the current symlink survive.
      - name: Package layout tarball
        run: |
          ln -s versions/${{ github.run_number }} layout/current
          tar -C layout -czf weavie-runner-linux-x64.tar.gz versions current

      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          built=$(git rev-parse HEAD)
          gh release delete main-latest --cleanup-tag --yes || true
          gh release create main-latest --prerelease \
            --target "$built" \
            --title "main latest (build ${{ github.run_number }})" \
            --notes "Rolling prerelease of green main ($built), build ${{ github.run_number }}. Consumed by weavie-runner --auto-update; extract into ~/.weavie/runner and launch current/Weavie.Runner." \
            weavie-runner-linux-x64.tar.gz
