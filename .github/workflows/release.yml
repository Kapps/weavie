# Release: publish each native shell as a self-contained, startup-optimized build.
#
# Startup optimization = ReadyToRun (PublishReadyToRun): IL is precompiled to native so there's
# little JIT work at launch. Native AOT is NOT usable here — WinForms (and WPF, which Weavie.Win
# enables for the WebView2 control) and WebView2 rely on reflection/COM that AOT doesn't support —
# so R2R + self-contained is the right lever. The publish output is a plain folder (no single-file
# compression, which would decompress at launch and hurt cold start), packaged into one downloadable
# archive per shell.
#
# Each shell publishes on its own OS (Weavie.Win needs Windows; Weavie.Mac needs the macOS workload).
# On a v* tag or manual dispatch the archive is uploaded as a build artifact. On green main
# (workflow_run) each shell archive is ALSO attached to the rolling `main-latest` prerelease as a
# downloadable app binary, alongside the runner+worker bundle the main_latest job publishes there for
# `weavie-runner --auto-update`. See docs/specs/runner-auto-update.md.
name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: read

jobs:
  # main_latest runs first (green main only): it delete/recreates the rolling prerelease with the
  # runner+worker bundle. The publish matrix then attaches each shell archive to that release.
  main_latest:
    name: main-latest prerelease
    # Only a PUSH-triggered ci success qualifies: workflow_run also fires for fork-PR ci runs, and a
    # fork branch named "main" must never reach a contents:write job (it could rewrite the release
    # feed the auto-updater trusts). Push events can only originate from this repo.
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Rapid main merges must not interleave the delete/recreate of the rolling release.
    concurrency:
      group: main-latest
      cancel-in-progress: true
    steps:
      # Checkout of the base repo's main tip — never an event-supplied sha, so no untrusted code can
      # reach this privileged build. The tip can be newer than the green commit that triggered us;
      # that run's own ci success re-triggers this workflow, and the newest publish wins either way.
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up toolchain and build web app
        uses: ./.github/actions/publish-setup

      # The remote control plane. Its publish stages the Weavie.Headless worker into worker/,
      # propagating RID + self-contained, so this single bundle is the full runner + headless deploy.
      - name: Publish runner bundle into the managed layout
        run: >
          dotnet publish src/Weavie.Runner/Weavie.Runner.csproj -c Release -r linux-x64
          --self-contained -p:PublishReadyToRun=true
          -o layout/versions/${{ github.run_number }}

      # A tarball (not upload-artifact's zip) so executable bits and the current symlink survive.
      - name: Package layout tarball
        run: |
          ln -s versions/${{ github.run_number }} layout/current
          tar -C layout -czf weavie-runner-linux-x64.tar.gz versions current

      # Managed layout (versions/<build>/ + current symlink) so extracting the tarball IS an install.
      # manifest.json (buildNumber + spawnContract) is written by the publish itself.
      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          built=$(git rev-parse HEAD)
          gh release delete main-latest --cleanup-tag --yes || true
          gh release create main-latest --prerelease \
            --target "$built" \
            --title "main latest (build ${{ github.run_number }})" \
            --notes "Rolling prerelease of green main ($built), build ${{ github.run_number }}. weavie-runner-linux-x64.tar.gz is the runner+worker bundle consumed by weavie-runner --auto-update (extract into ~/.weavie/runner and launch current/Weavie.Runner); the weavie-{linux,win,osx}-* archives are downloadable app binaries. See docs/specs/runner-auto-update.md." \
            weavie-runner-linux-x64.tar.gz

  publish:
    name: publish (${{ matrix.name }})
    # Tag/dispatch always; on workflow_run only for a green main PUSH (never a fork-PR ci run, which
    # must not reach the contents:write release upload). !cancelled() lets this run past the skipped
    # main_latest need on the tag/dispatch path.
    if: >-
      !cancelled() && (
        github.event_name != 'workflow_run' ||
        ( github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' )
      )
    needs: main_latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    # An older run's slow shell uploads must not --clobber a newer run's freshly recreated release.
    # Each platform gets its own green-main group so matrix jobs run together while a newer merge
    # still cancels the stale build for that platform. Tag/dispatch runs never cancel each other.
    concurrency:
      group: main-latest-publish-${{ github.event_name == 'workflow_run' && 'main' || github.run_id }}-${{ matrix.name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            project: src/Weavie.Linux/Weavie.Linux.csproj
            rid: linux-x64
            # R2R + self-contained: native-precompiled, no machine .NET dependency.
            extra: --self-contained -p:PublishReadyToRun=true
            asset: weavie-linux-x64.tar.gz
          - name: win-x64
            os: windows-latest
            project: src/Weavie.Win/Weavie.Win.csproj
            rid: win-x64
            extra: --self-contained -p:PublishReadyToRun=true
            asset: weavie-win-x64.zip
          - name: osx-arm64
            # macOS 26 (Tahoe) image — ships Xcode 26, which net10.0-macos requires. See ci.yml.
            os: macos-26
            project: src/Weavie.Mac/Weavie.Mac.csproj
            rid: osx-arm64
            # net10.0-macos publishes a self-contained .app via the macos workload. Trimming is
            # disabled in the csproj (PublishTrimmed=false): Weavie.Core's reflection-based
            # System.Text.Json isn't trim-safe. R2R isn't the lever here, so it's left to the
            # workload's Release defaults.
            extra: ""
            asset: weavie-osx-arm64.zip
    steps:
      # On green main, build the trusted main tip — never an event-supplied sha — since the archive
      # is attached to the auto-update release feed. Tag/dispatch check out their own ref.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.ref }}

      - name: Set up toolchain and build web app
        uses: ./.github/actions/publish-setup

      # The hosted image's default Xcode lags the .NET macOS workload's requirement (e.g. workload
      # 26.5.10301 needs Xcode 26.6, but the image defaults to 26.5). Both ship side-by-side on the
      # runner, so select the newest installed one rather than a version pinned here that would
      # itself go stale the next time the workload's requirement moves. See ci.yml.
      # FLAKE LOG: 2026-07-14 22:37 and 23:17 UTC, the osx-arm64 publish job failed on this exact
      # mismatch before this step existed here (release.yml never got ci.yml's fix) — runs
      # https://github.com/Kapps/weavie/actions/runs/29373579290 and
      # https://github.com/Kapps/weavie/actions/runs/29375700623. Fixed by porting ci.yml's step
      # (commit 07b6d07). Green on every release run since.
      - name: Select latest Xcode
        if: matrix.name == 'osx-arm64'
        run: sudo xcode-select -s "$(find /Applications -maxdepth 1 -name 'Xcode_*.app' -type d | sort -V | tail -1)"

      - name: Restore macOS workload
        if: matrix.name == 'osx-arm64'
        run: dotnet workload restore ${{ matrix.project }}

      - name: Publish
        run: >
          dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }}
          ${{ matrix.extra }} -o artifacts/${{ matrix.name }}

      # The COMPLETE macOS bundle is the .app the build assembles at bin/ (populated by CopyWebAssets +
      # BuildPtyShim + the hook-relay co-location), NOT the .pkg `dotnet publish` emits — that .pkg
      # lacks the hand-copied web UI / PTY shim / hook relay and boots to a blank WKWebView. Verify
      # that .app, re-sign it (the post-build copies invalidate the SDK's mid-build ad-hoc signature,
      # and on Apple Silicon an invalid signature reads as "damaged and can't be opened"), and zip it
      # (a drag-to-Applications bundle — friendlier for an unsigned app than an unsigned .pkg). It's
      # still not Developer-ID-signed/notarized, so first launch is right-click > Open (or
      # `xattr -dr com.apple.quarantine Weavie.app`).
      - name: Package macOS app
        if: matrix.name == 'osx-arm64'
        shell: bash
        run: |
          app="src/Weavie.Mac/bin/Release/net10.0-macos/${{ matrix.rid }}/Weavie.app"
          required=(
            "$app/Contents/MacOS/Weavie"
            "$app/Contents/Resources/wwwroot/index.html"
            "$app/Contents/MonoBundle/libweavie_pty.dylib"
            "$app/Contents/MonoBundle/weavie-hook-relay"
          )
          missing=0
          for f in "${required[@]}"; do
            if [ -e "$f" ]; then echo "ok: $f"; else echo "MISSING: $f"; missing=1; fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Built Weavie.app is incomplete — see MISSING entries above."
            echo "Bundle contents:"; find "$app" -maxdepth 3 -print
            exit 1
          fi
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" "${{ matrix.asset }}"

      # tar (not zip) so the self-contained executable's +x bit survives download+extract on Linux.
      - name: Package Linux archive
        if: matrix.name == 'linux-x64'
        run: tar -C artifacts/${{ matrix.name }} -czf "${{ matrix.asset }}" .

      - name: Package Windows archive
        if: matrix.name == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path artifacts/${{ matrix.name }}/* -DestinationPath "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weavie-${{ matrix.name }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

      # Green main: attach the archive to the rolling prerelease as a downloadable binary. Gated on
      # main_latest having (re)created the release with the runner bundle first; --clobber replaces a
      # prior run's asset of the same name.
      - name: Attach to main-latest prerelease
        if: github.event_name == 'workflow_run' && needs.main_latest.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload main-latest "${{ matrix.asset }}" --clobber
