# Release: publish each native shell as a self-contained, startup-optimized build.
#
# Startup optimization = ReadyToRun (PublishReadyToRun): IL is precompiled to native so there's
# little JIT work at launch. Native AOT is NOT usable here — WinForms (and WPF, which Weavie.Win
# enables for the WebView2 control) and WebView2 rely on reflection/COM that AOT doesn't support —
# so R2R + self-contained is the right lever. Output is a plain folder (no single-file compression,
# which would decompress at launch and hurt cold start).
#
# Each shell publishes on its own OS (Weavie.Win needs Windows; Weavie.Mac needs the macOS workload)
# and the result is uploaded as a build artifact. Triggered manually or by pushing a v* tag.
name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: publish (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            project: src/Weavie.Linux/Weavie.Linux.csproj
            rid: linux-x64
            # R2R + self-contained: native-precompiled, no machine .NET dependency.
            extra: --self-contained -p:PublishReadyToRun=true
          - name: win-x64
            os: windows-latest
            project: src/Weavie.Win/Weavie.Win.csproj
            rid: win-x64
            extra: --self-contained -p:PublishReadyToRun=true
          - name: osx-arm64
            # macOS 26 (Tahoe) image — ships Xcode 26, which net10.0-macos requires. See ci.yml.
            os: macos-26
            project: src/Weavie.Mac/Weavie.Mac.csproj
            rid: osx-arm64
            # net10.0-macos publishes a self-contained .app via the macos workload. Trimming is
            # disabled in the csproj (PublishTrimmed=false): Weavie.Core's reflection-based
            # System.Text.Json isn't trim-safe, so full trimming fails publish (and risks runtime
            # breakage). R2R isn't the lever here, so it's left to the workload's Release defaults.
            extra: ""
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # Latest 10.0 SDK — see ci.yml: global.json pins "10.0.0", which setup-dotnet 404s on.
          dotnet-version: '10.0.x'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Keep in sync with the packageManager field in src/web/package.json.
          version: 11.8.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.x requires Node >= 22.13 (it loads the built-in node:sqlite module), so Node 20
          # crashes setup-node's pnpm cache probe. Keep this at 22+.
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      # The web UI every shell embeds. Build it first so wwwroot exists (Weavie.Mac hard-errors
      # without it); the Release publish below also bundles it next to the binary.
      - name: Build web app
        working-directory: src/web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Restore macOS workload
        if: matrix.name == 'osx-arm64'
        run: dotnet workload restore ${{ matrix.project }}

      - name: Publish
        run: >
          dotnet publish ${{ matrix.project }} -c Release -r ${{ matrix.rid }}
          ${{ matrix.extra }} -o artifacts/${{ matrix.name }}

      # Package the macOS app. `dotnet publish` for the macOS SDK emits a .pkg installer
      # (artifacts/<name>/Weavie.Mac-*.pkg) whose payload is staged from the publish item pipeline and
      # does NOT include the build's hand-copied web UI / PTY shim / hook relay — that .pkg boots to a
      # blank white WKWebView (app://app/index.html 404s). The COMPLETE bundle is the one the build
      # assembles at the project's bin/ output (CopyWebAssets + BuildPtyShim + the hook-relay
      # co-location all populate it). So verify THAT .app, then ship it zipped (a drag-to-Applications
      # bundle — friendlier for an unsigned app than an unsigned .pkg) instead of the .pkg.
      - name: Verify and package macOS app
        if: matrix.name == 'osx-arm64'
        shell: bash
        run: |
          app="src/Weavie.Mac/bin/Release/net10.0-macos/${{ matrix.rid }}/Weavie.Mac.app"
          required=(
            "$app/Contents/MacOS/Weavie.Mac"
            "$app/Contents/Resources/wwwroot/index.html"
            "$app/Contents/MonoBundle/libweavie_pty.dylib"
            "$app/Contents/MonoBundle/weavie-hook-relay"
          )
          missing=0
          for f in "${required[@]}"; do
            if [ -e "$f" ]; then
              echo "ok: $f"
            else
              echo "MISSING: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Built Weavie.Mac.app is incomplete — see MISSING entries above."
            echo "Bundle contents:"; find "$app" -maxdepth 3 -print
            exit 1
          fi
          # Replace the .pkg-containing publish dir with just the zipped .app.
          rm -rf "artifacts/${{ matrix.name }}"
          mkdir -p "artifacts/${{ matrix.name }}"
          ditto -c -k --sequesterRsrc --keepParent "$app" "artifacts/${{ matrix.name }}/Weavie.Mac.app.zip"
          echo "Packaged $(du -h "artifacts/${{ matrix.name }}/Weavie.Mac.app.zip" | cut -f1) zip."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weavie-${{ matrix.name }}
          path: artifacts/${{ matrix.name }}
          if-no-files-found: error
