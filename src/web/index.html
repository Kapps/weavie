<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/weavie.svg" />
    <title>weavie</title>
    <!-- Painted before any JS loads: a dark canvas + centered wordmark so the WebView's first frame is
         intentional, not a white flash. The splash stays on top of the whole app and is removed by
         dismissSplash() in one step on the first painted terminal frame (the primary surface; the editor
         pane fills in under it when Monaco loads) — or on editor-ready as a fallback. One clean reveal
         instead of a relay of placeholders, and no fade (a fade is pure startup latency). Inline (no
         external CSS) so it costs zero requests and paints immediately. -->
    <style>
      html, body { height: 100%; margin: 0; background: #000000; color: #cdd5dc; }
      #root { height: 100%; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        font: 600 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.08em; color: #54c6a4; background: #000000;
      }
    </style>
    <!-- Boot error capture. A CLASSIC inline script, run outside the ES-module graph: if a module fails
         to load or link (e.g. a bad import), main.tsx — and the error handlers it would install — never
         runs, so without this a boot failure is invisible (splash hangs forever, no log). This survives
         that and forwards uncaught errors to the host log, so a broken boot is loud, never silent. -->
    <script>
      (() => {
        function toHost(level, message) {
          try {
            const h = window.webkit?.messageHandlers?.weavie;
            if (h) h.postMessage(JSON.stringify({ type: "log", level: level, message: message }));
          } catch (_err) {}
        }
        window.addEventListener(
          "error",
          (e) => {
            var t = e.target;
            if (t && t !== window && t.tagName) {
              toHost("warn", `resource failed to load: ${t.src || t.href || t.tagName}`);
            } else {
              const at = e.filename ? ` @ ${e.filename}:${e.lineno}:${e.colno}` : "";
              toHost("error", `uncaught: ${e.message || "unknown error"}${at}`);
            }
          },
          true,
        );
        window.addEventListener("unhandledrejection", (e) => {
          var r = e.reason;
          toHost("error", `unhandledrejection: ${String((r?.message) || r)}`);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <img src="/weavie.svg" width="144" height="144" alt="" />
      <span>weavie</span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
