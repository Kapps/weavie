<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/weavie.svg" />
    <title>weavie</title>
    <!-- Painted before any JS loads: a dark canvas + centered wordmark so the WebView's first frame is
         intentional, not a white flash. The splash stays on top of the whole app and is faded out by
         dismissSplash() only once the editor is ready — one clean reveal instead of a relay of
         placeholders. Inline (no external CSS) so it costs zero requests and paints immediately. -->
    <style>
      html, body { height: 100%; margin: 0; background: #1e1e1e; color: #d4d4d4; }
      #root { height: 100%; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        font: 600 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.08em; color: #4ec9b0; background: #1e1e1e;
        transition: opacity 0.18s ease;
      }
      #splash.hide { opacity: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <svg width="58" height="58" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M2 5c5 0 5 14 10 14s5-14 10-14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
        <path d="M2 19c5 0 5-14 10-14s5 14 10 14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity="0.5" />
      </svg>
      <span>weavie</span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
