# pnpm settings for the Weavie web app.
#
# allowBuilds: pnpm 10+ does not run a dependency's install/build scripts unless it is allowlisted.
# biome and esbuild fetch their platform binaries that way, so the `biome check` lint and the
# Vite/esbuild build need them approved.
#
# overrides: vite and @codingame/esbuild-import-meta-url-plugin pull different esbuild versions;
# npm's flat tree collapsed them to one, but pnpm keeps both, so the plugin's esbuild `Plugin` type
# stops matching vite's in vite.config.ts. Pin a single version inside vite's range (the plugin's API
# is stable across these releases). 0.25.x also closes GHSA-67mh-4wv8-2f99 (dev server SSRF).
# dompurify is pulled transitively by the monaco-vscode quickaccess override; pin a patched release to
# close the XSS / prototype-pollution advisories affecting <=3.3.x.
allowBuilds:
  '@biomejs/biome': true
  esbuild: true
overrides:
  esbuild: 0.25.12
  dompurify: 3.4.11
