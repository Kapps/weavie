<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/weavie.svg" />
    <title>weavie</title>
    <!-- Standalone empty-state entry (no editor / terminals / session): the welcome screen shown when
         there's no workspace to restore. Mirrors index.html's pre-JS splash so the WebView's first frame
         is an intentional dark canvas, not a white flash; faded out once <Welcome> mounts. Inline (no
         external CSS) so it paints with zero requests. -->
    <style>
      html, body { height: 100%; margin: 0; background: #181a1b; color: #e6e8e9; }
      #root { height: 100%; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        font: 600 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.08em; color: #4ec9b0; background: #181a1b;
        transition: opacity 0.18s ease;
      }
      #splash.hide { opacity: 0; }
    </style>
    <!-- Boot error capture. A CLASSIC inline script, run outside the ES-module graph: if a module fails
         to load or link (e.g. a bad import), the welcome entry — and the error handlers it would install
         — never runs, so without this a boot failure is invisible (splash hangs forever, no log). This
         survives that and forwards uncaught errors to the host log, so a broken boot is loud, never silent. -->
    <script>
      (function () {
        function toHost(level, message) {
          try {
            var h = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.weavie;
            if (h) h.postMessage(JSON.stringify({ type: "log", level: level, message: message }));
          } catch (err) {}
        }
        window.addEventListener(
          "error",
          function (e) {
            var t = e.target;
            if (t && t !== window && t.tagName) {
              toHost("warn", "resource failed to load: " + (t.src || t.href || t.tagName));
            } else {
              var at = e.filename ? " @ " + e.filename + ":" + e.lineno + ":" + e.colno : "";
              toHost("error", "uncaught: " + (e.message || "unknown error") + at);
            }
          },
          true,
        );
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          toHost("error", "unhandledrejection: " + String((r && r.message) || r));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash">
      <img src="/weavie.svg" width="144" height="144" alt="" />
      <span>weavie</span>
    </div>
    <script type="module" src="/src/welcome/index.tsx"></script>
  </body>
</html>
